name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        working-directory: backend
        run: uv sync --extra dev
      - name: Migration chain integrity
        working-directory: backend
        run: uv run python -m pytest tests/test_migrations/ -q
      - name: Fresh DB migration verify
        working-directory: backend
        run: uv run python scripts/verify_migrations.py
      - name: Benchmark smoke
        working-directory: backend
        run: uv run python scripts/benchmark_smoke.py
      - name: Backend tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          DATABASE_URL_SYNC: sqlite:///./test.db
        run: uv run python -m pytest tests/ -q --ignore=tests/test_migrations
      - name: OpenAPI contract smoke
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          DATABASE_URL_SYNC: sqlite:///./test.db
        run: uv run python -m pytest tests/test_api/test_openapi_contract.py -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Unit tests
        working-directory: frontend
        run: npm test -- --run

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend deps
        working-directory: backend
        run: uv sync --extra dev
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Build frontend for E2E
        working-directory: frontend
        env:
          API_URL: http://127.0.0.1:8100
          NODE_ENV: production
        run: npm run build
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: E2E smoke tests
        working-directory: frontend
        env:
          CI: "true"
        run: npm run test:e2e