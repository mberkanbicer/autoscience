// ─── LAYOUT ENGINE ──────────────────────────────────────────────────────
const LAYER_GAP = 80;
const NODE_W = 140, NODE_H = 52;
const LV = [0,0,0,0,0,0,0,0]; // items per layer

function build_graph_data(viewKey) {
  const v = views[viewKey];
  const nodes = v.nodes.map((n, i) => {
    const l = layers[n.layer];
    const col = LV[n.layer]++;
    const x = 60 + col * (NODE_W + 20);
    const y = l.y + 10;
    return { ...n, index: i, x, y, lx: x + NODE_W/2, ly: y + NODE_H/2 };
  });
  const edges = v.edges.map(e => {
    const src = nodes[e[0]], dst = nodes[e[1]];
    const el = (v.edgeLabels || []).find(el => el.src === e[0] && el.dst === e[1]);
    return { source: src, target: dst, label: el ? el.label : "" };
  });
  nodes.forEach(n => {
    n.fx = n.x; n.fy = n.y;
  });
  return { nodes, edges, legend: v.legend, v };
}

function draw(viewKey) {
  const { nodes, edges, legend } = build_graph_data(viewKey);
  const tooltip = d3.select("#tooltip");
  const width = document.getElementById("container").clientWidth;
  const height = document.getElementById("container").clientHeight;

  const svg = d3.select("#container").selectAll("svg").remove();
  const svgEl = d3.select("#container").append("svg").attr("width", width).attr("height", height);

  // Layer backgrounds
  const maxCol = d3.max(nodes, n => {
    const l = layers[n.layer];
    return nodes.filter(m => m.layer === n.layer).length;
  }) || 5;
  const svgW = 60 + maxCol * (NODE_W + 20) + 20 + 40;

  svgEl.append("defs").html(`
    <marker id="arrowhead" viewBox="0 0 10 10" refX="20" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="rgba(253,250,246,0.3)"/></marker>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  `);

  // Layers
  var gLayer = svgEl.append("g");
  layers.forEach(l => {
    const count = nodes.filter(n => n.layer === l.idx !== undefined ? n.layer : layers.indexOf(layers.find(ll => ll.id === l.id))).length;
  });

  // Recalculate per view
  const layerCounts = {};
  nodes.forEach(n => {
    const lid = layers[n.layer]?.id || `l${n.layer}`;
    layerCounts[lid] = (layerCounts[lid] || 0) + 1;
  });

  Object.keys(layerCounts).forEach(lid => {
    const l = layers.find(ll => ll.id === lid);
    if (!l) return;
    const cnt = layerCounts[lid];
    const bgW = Math.max(cnt * (NODE_W + 20) + 40, 150);
    const bgH = 70;
    gLayer.append("rect")
      .attr("x", 10)
      .attr("y", l.y - 8)
      .attr("width", Math.min(bgW, svgW - 20))
      .attr("height", bgH)
      .attr("fill", l.color)
      .attr("opacity", 0.08)
      .attr("rx", 8);
    gLayer.append("text")
      .attr("x", 20)
      .attr("y", l.y + 14)
      .attr("fill", "rgba(253,250,246,0.4)")
      .attr("font-size", "11px")
      .attr("font-weight", "600")
      .text(l.label);
  });

  // Edges
  var gEdge = svgEl.append("g");
  edges.forEach(e => {
    const sx = e.source.x + NODE_W/2, sy = e.source.y + NODE_H;
    const tx = e.target.x + NODE_W/2, ty = e.target.y;
    gEdge.append("path")
      .attr("d", `M${sx},${sy} Q${(sx+tx)/2},${(sy+ty)/2} ${tx},${ty}`)
      .attr("fill", "none")
      .attr("stroke", "rgba(253,250,246,0.25)")
      .attr("stroke-width", 1.5)
      .attr("marker-end", "url(#arrowhead)");
    if (e.label) {
      const mx = (sx+tx)/2, my = (sy+ty)/2;
      gEdge.append("rect")
        .attr("x", mx - 4)
        .attr("y", my - 10)
        .attr("width", e.label.length * 6 + 8)
        .attr("height", 16)
        .attr("fill", "rgba(28,25,23,0.7)")
        .attr("rx", 3);
      gEdge.append("text")
        .attr("x", mx)
        .attr("y", my + 3)
        .attr("fill", "rgba(253,250,246,0.5)")
        .attr("font-size", "10px")
        .attr("text-anchor", "middle")
        .text(e.label);
    }
  });

  // Nodes
  var gNode = svgEl.append("g");
  nodes.forEach(n => {
    const g = gNode.append("g")
      .attr("class", "node")
      .attr("transform", `translate(${n.x},${n.y})`)
      .on("mouseover", () => {
        const desc = n.desc || `${n.label} — ${layers[n.layer]?.label || ""}`;
        tooltip.style("opacity", 1)
          .html(`<h3>${n.label.replace(/\n/g, ' ')}</h3><div class="badge badge-orange">${layers[n.layer]?.label || ""}</div><div>${desc}</div>`);
      })
      .on("mousemove", (e) => {
        const t = tooltip.node();
        const rect = document.getElementById("container").getBoundingClientRect();
        let lx = e.clientX - rect.left + 12, ly = e.clientY - rect.top - 10;
        if (lx + 360 > rect.width) lx = e.clientX - rect.left - 360;
        if (ly < 10) ly = 10;
        t.style.left = lx + "px";
        t.style.top = ly + "px";
      })
      .on("mouseout", () => tooltip.style("opacity", 0));

    const w = NODE_W, h = n.label.includes("\n") ? NODE_H + 12 : NODE_H;
    const isWarning = n.warning;
    g.append("rect")
      .attr("width", w)
      .attr("height", h)
      .attr("rx", 8)
      .attr("fill", n.color)
      .attr("opacity", 0.85)
      .attr("stroke", isWarning ? "#ef4444" : "rgba(253,250,246,0.1)")
      .attr("stroke-width", isWarning ? 2 : 1)
      .attr("filter", isWarning ? "url(#glow)" : null);

    const lines = n.label.split("\n");
    g.selectAll("text")
      .data(lines)
      .enter()
      .append("text")
      .attr("x", w/2)
      .attr("y", (d,i) => (h/2) + (i - (lines.length-1)/2) * 16)
      .attr("text-anchor", "middle")
      .attr("fill", "#fff")
      .attr("font-size", "11px")
      .attr("font-weight", "500")
      .text(d => d);
  });

  // Legend
  const legendEl = d3.select("#legend");
  legendEl.html(`
    ${legend.map(l => `<div class="legend-item"><div class="legend-dot" style="background:${l.color}"></div>${l.label}</div>`).join("")}
    <div class="legend-item" style="margin-top:6px;border-top:1px solid rgba(253,250,246,0.1);padding-top:6px;">
      <div class="legend-dot" style="background:rgba(239,68,68,0.7)"></div>Safety Gate / Risk
    </div>
  `);
}

// ─── VIEW SWITCH ────────────────────────────────────────────────────────
document.querySelectorAll(".controls button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".controls button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    draw(btn.dataset.view);
  });
});

window.addEventListener("resize", () => {
  const active = document.querySelector(".controls button.active");
  if (active) draw(active.dataset.view);
});

draw("full");
</script>
</body>
</html>
