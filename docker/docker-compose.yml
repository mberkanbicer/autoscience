version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: autoscience-postgres
    environment:
      POSTGRES_DB: autoscience
      POSTGRES_USER: autoscience
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoscience}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoscience"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: autoscience-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: autoscience-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://autoscience:${POSTGRES_PASSWORD:-autoscience}@postgres:5432/autoscience
      - DATABASE_URL_SYNC=postgresql://autoscience:${POSTGRES_PASSWORD:-autoscience}@postgres:5432/autoscience
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOCAL_LLM_BASE_URL=${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-openai}
      - APP_DEBUG=${APP_DEBUG:-false}
      - CORS_ORIGINS=["http://localhost:3000"]
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - artifacts_data:/app/artifacts

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: autoscience-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  artifacts_data:
