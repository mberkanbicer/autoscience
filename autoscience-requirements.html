.stat .num.amber { color: #d97706; }

  color: #fdfaf6; padding: 6px 14px; border-radius: 6px; cursor: pointer;

}
.filters button:hover { background: rgba(253,250,246,0.15); }
.filters button.active { background: #d97706; border-color: #d97706; }
main { padding: 32px 40px; max-width: 1000px; margin: 0 auto; }
.category { margin-bottom: 32px; }
.category h2 {
  font-size: 18px; font-weight: 700; color: #d97706;
  padding-bottom: 8px; border-bottom: 1px solid rgba(253,250,246,0.1);
  margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
}
.category h2 .count { font-size: 13px; font-weight: 500; color: #a8a29e; }
.subsection { margin-bottom: 20px; }
.subsection h3 { font-size: 14px; font-weight: 600; color: #fdfaf6; margin-bottom: 8px; }
.requirement {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 12px; border-radius: 6px;
  transition: background 0.2s; cursor: default;
}
.requirement:hover { background: rgba(253,250,246,0.03); }
.requirement.check { color: #a8a29e; text-decoration: line-through; opacity: 0.7; }
.requirement.uncheck { color: #fdfaf6; }
.requirement.partial { color: #d97706; }
.checkbox {
  width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; margin-top: 3px;
}
.checkbox.done { background: #22c55e; color: #fff; }
.checkbox.partial { background: #d97706; color: #fff; }
.checkbox.todo { background: rgba(253,250,246,0.1); border: 1px solid rgba(253,250,246,0.2); color: #a8a29e; }
.checkbox.missing { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; color: #ef4444; }
.requirement .label { font-size: 14px; }
.requirement .tag {
  display: inline-block; padding: 1px 6px; border-radius: 3px;
  font-size: 10px; font-weight: 600; margin-left: 6px;

.tag.p0 { background: rgba(239,68,68,0.2); color: #ef4444; }
.tag.p1 { background: rgba(217,119,6,0.2); color: #d97706; }
.tag.p2 { background: rgba(168,85,247,0.2); color: #a855f7; }
.hidden { display: none; }

function render(filter) {
  let total = 0, done = 0, partial = 0, todo = 0, missing_hmm = 0;
  data.forEach(cat => cat.subsections.forEach(sec => sec.items.forEach(item => {
    total++;
    if (item.status === 'done') done++;
    else if (item.status === 'partial') partial++;
    else if (item.status === 'todo') todo++;
    else if (item.status === 'missing') missing_hmm++;
  })));

  document.getElementById("summary").innerHTML = `
    <div class="stat"><div class="num green">${done}</div><div class="label">Complete</div></div>
    <div class="stat"><div class="num amber">${partial}</div><div class="label">Partial</div></div>
    <div class="stat"><div class="num" style="color:#a8a29e">${todo}</div><div class="label">TODO</div></div>
    <div class="stat"><div class="num red">${missing_hmm}</div><div class="label">Missing</div></div>
    <div class="stat"><div class="num gray">${total}</div><div class="label">Total</div></div>
    <div class="stat"><div class="num" style="color:${done/total > 0.7 ? '#22c55e' : '#d97706'}">${Math.round(done/total*100)}%</div><div class="label">Completion</div></div>
  `;

  const main = document.getElementById("main");
  main.innerHTML = "";
  data.forEach((cat, ci) => {
    const div = document.createElement("div");
    div.className = "category";
    let totalCat = 0, doneCat = 0;
    cat.subsections.forEach(sec => sec.items.forEach(item => { totalCat++; if (item.status === 'done') doneCat++; }));
    div.innerHTML = `<h2>${cat.icon} ${cat.name} <span class="count">(${doneCat}/${totalCat})</span></h2>`;
    cat.subsections.forEach(sec => {
      const sdiv = document.createElement("div");
      sdiv.className = "subsection";
      sdiv.innerHTML = `<h3>${sec.name}</h3>`;
      sec.items.forEach(item => {
        const statusClasses = { done: "done", partial: "partial", todo: "todo", missing: "missing" };
        const checkChars = { done: "✓", partial: "◐", todo: "○", missing: "✗" };
        const hide = filter === "all" ? "" : filter === "done" && item.status !== "done" ? "hidden" : filter === "partial" && item.status !== "partial" ? "hidden" : filter === "todo" && item.status !== "todo" ? "hidden" : filter === "missing" && item.status !== "missing" ? "hidden" : "";
        const row = document.createElement("div");
        row.className = `requirement ${item.status === 'done' ? 'check' : item.status === 'partial' ? 'partial' : 'uncheck'} ${hide}`;
        row.innerHTML = `
          <div class="checkbox ${statusClasses[item.status]}">${checkChars[item.status]}</div>
          <div><span class="label">${item.label}</span>${item.priority ? `<span class="tag ${item.priority}">${item.priority.toUpperCase()}</span>` : ""}</div>
        `;
        sdiv.appendChild(row);
      });
      div.appendChild(sdiv);
    });
    main.appendChild(div);
  });
}

document.getElementById("filters").addEventListener("click", (e) => {
  if (e.target.tagName !== "BUTTON") return;
  document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
  e.target.classList.add("active");
  render(e.target.dataset.filter);
});
